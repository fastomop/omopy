name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python
        run: uv python install

      - name: Build
        run: uv build

      - name: Smoke test (wheel)
        run: |
          uv run --isolated --no-project --with dist/*.whl -- \
            python -c "import omopy; print(f'omopy wheel OK')"

      - name: Smoke test (source distribution)
        run: |
          uv run --isolated --no-project --with dist/*.tar.gz -- \
            python -c "import omopy; print(f'omopy sdist OK')"

      - name: Publish to PyPI
        run: uv publish
